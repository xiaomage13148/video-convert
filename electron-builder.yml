appId: com.video-convert.pro
productName: Video Convert Pro
directories:
  buildResources: build
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - "!node_modules"
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
buildDependenciesFromSource: false
win:
  icon: build/icon.png
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
